// 프리로드된 영상(blob URL) 매핑을 하위로 전달
const VideoContext = React.createContext({});

const VideoBg = ({ src, className = '', poster }) => {
  const preloaded = React.useContext(VideoContext);
  const resolved = preloaded[src] || src; // 받아둔 blob 있으면 재사용
  const ref = React.useRef(null);

  // 어떤 경우에도 소리가 나지 않도록 강제 무음 유지
  const forceMute = React.useCallback(() => {
    const v = ref.current;
    if (!v) return;
    if (!v.muted) v.muted = true;
    if (v.volume !== 0) v.volume = 0;
  }, []);

  React.useEffect(() => {
    forceMute();
  }, [forceMute, resolved]);

  return (
    <video
      ref={ref}
      className={className}
      src={resolved}
      poster={poster}
      autoPlay loop muted playsInline preload="auto"
      onLoadedMetadata={forceMute}
      onPlay={forceMute}
      onVolumeChange={forceMute} /* 음소거 해제 시도를 즉시 되돌림 */
    />
  );
};

/* ── 영상 프리로더 ───────────────────────────────────────────────
   모든 영상을 fetch로 받아 진행률을 계산하고, blob URL로 변환해
   재다운로드 없이 즉시 재생되도록 한다. file:// 등에서 실패하면
   원본 src로 안전하게 폴백한다. */
const usePreloadVideos = (sources) => {
  const [progress, setProgress] = useState(0);
  const [done, setDone]         = useState(false);
  const [map, setMap]           = useState({});

  useEffect(() => {
    let cancelled = false;
    const objectUrls = {};
    const totals = sources.map(() => 0);
    const loads  = sources.map(() => 0);

    const recompute = () => {
      const total  = totals.reduce((a, b) => a + b, 0);
      const loaded = loads.reduce((a, b) => a + b, 0);
      if (total > 0) setProgress(Math.min(99, Math.round((loaded / total) * 100)));
    };

    const loadOne = async (src, i) => {
      try {
        const res = await fetch(src);
        if (!res.ok || !res.body) throw new Error('fetch failed');
        const len = parseInt(res.headers.get('Content-Length') || '0', 10);
        totals[i] = len;
        const reader = res.body.getReader();
        const chunks = [];
        while (true) {
          const { done: rDone, value } = await reader.read();
          if (rDone) break;
          chunks.push(value);
          loads[i] += value.length;
          if (!cancelled) recompute();
        }
        if (!totals[i]) { totals[i] = loads[i]; } // Content-Length 없을 때 보정
        const blob = new Blob(chunks, { type: res.headers.get('Content-Type') || 'video/mp4' });
        objectUrls[src] = URL.createObjectURL(blob);
      } catch (e) {
        objectUrls[src] = src; // 폴백: 원본 주소로 그냥 재생
      }
    };

    (async () => {
      await Promise.all(sources.map(loadOne));
      if (cancelled) return;
      setMap(objectUrls);
      setProgress(100);
      setDone(true);
    })();

    return () => {
      cancelled = true;
      Object.values(objectUrls).forEach(u => {
        if (typeof u === 'string' && u.startsWith('blob:')) URL.revokeObjectURL(u);
      });
    };
  }, []);

  return { progress, done, map };
};

/* ── Section 4: Final CTA ────────────────────────────────────── */
const CONTACT_EMAIL = 'ducks0413@naver.com';

const MESSAGE_MIN = 10;

const validateContact = ({ name, from, message }) => {
  const errors = {};
  if (!name.trim()) {
    errors.name = '이름을 입력해주세요.';
  }
  if (!from.trim()) {
    errors.from = '이메일을 입력해주세요.';
  } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(from.trim())) {
    errors.from = '정상적인 이메일을 작성해주세요.';
  }
  if (message.trim().length < MESSAGE_MIN) {
    errors.message = `내용을 ${MESSAGE_MIN}글자 이상 작성해주세요.`;
  }
  return errors;
};

const ContactForm = () => {
  const [name, setName]       = useState('');
  const [from, setFrom]       = useState('');
  const [message, setMessage] = useState('');
  const [status, setStatus]   = useState('idle'); // idle | sending | success | error
  const [errorMsg, setErrorMsg] = useState('');
  const [errors, setErrors]   = useState({}); // { name, from, message }

  // 입력값을 고치면 해당 항목의 에러를 즉시 해제
  const clearError = (key) =>
    setErrors(prev => (prev[key] ? { ...prev, [key]: undefined } : prev));

  const submit = async (e) => {
    e.preventDefault();
    if (status === 'sending') return;

    const found = validateContact({ name, from, message });
    if (Object.keys(found).length > 0) {
      setErrors(found);
      setStatus('idle');
      setErrorMsg('');
      return;
    }
    setErrors({});

    setStatus('sending');
    setErrorMsg('');
    try {
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, from, message }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || '전송에 실패했습니다.');
      setStatus('success');
      setName(''); setFrom(''); setMessage('');
    } catch (err) {
      setStatus('error');
      setErrorMsg(err.message || '전송 중 오류가 발생했습니다.');
    }
  };

  const field =
    'w-full bg-bg/70 rounded-xl px-5 py-4 font-mono text-xl md:text-2xl font-bold text-white placeholder:text-white/55 placeholder:font-normal ' +
    'outline-none focus:bg-bg/85 transition-colors';
  const fieldStyle      = { boxShadow: 'inset 0 0 0 1.5px rgba(255,255,255,0.3)' };
  const fieldErrorStyle = { boxShadow: 'inset 0 0 0 1.5px rgba(248,113,113,0.9)' };
  const errorText = 'font-mono text-xs md:text-sm tracking-[0.08em] text-red-400 -mt-3 ml-1';

  return (
    <form onSubmit={submit} noValidate className="liquid-glass glass-card rounded-2xl p-8 md:p-12 flex flex-col gap-5">
      <p className="font-mono text-base md:text-lg tracking-[0.3em] text-white/75 uppercase mb-1">
        // SEND A MESSAGE
      </p>
      <input
        className={field} style={errors.name ? fieldErrorStyle : fieldStyle}
        type="text" placeholder="이름" value={name}
        onChange={e => { setName(e.target.value); clearError('name'); }}
        aria-invalid={!!errors.name}
      />
      {errors.name && <p className={errorText}>{errors.name}</p>}
      <input
        className={field} style={errors.from ? fieldErrorStyle : fieldStyle}
        type="email" placeholder="회신받을 이메일" value={from}
        onChange={e => { setFrom(e.target.value); clearError('from'); }}
        aria-invalid={!!errors.from}
      />
      {errors.from && <p className={errorText}>{errors.from}</p>}
      <textarea
        className={field + ' resize-none leading-relaxed'} style={errors.message ? fieldErrorStyle : fieldStyle}
        rows={4} placeholder="내용을 입력하세요 (10글자 이상)" value={message}
        onChange={e => { setMessage(e.target.value); clearError('message'); }}
        aria-invalid={!!errors.message}
      />
      {errors.message && <p className={errorText}>{errors.message}</p>}
      <button
        type="submit"
        disabled={status === 'sending'}
        className="mt-1 rounded-full py-4 md:py-5 inline-flex items-center justify-center gap-3 text-white font-grotesk font-bold tracking-[0.2em] text-2xl md:text-3xl transition-transform hover:scale-[1.02] disabled:opacity-60 disabled:hover:scale-100 disabled:cursor-not-allowed"
        style={{ background: 'rgba(255,255,255,0.08)', boxShadow: 'inset 0 0 0 2px rgba(255,255,255,0.5)' }}
      >
        {status === 'sending' ? '보내는 중…' : '보내기'}
        {status !== 'sending' && <Icon name="arrow-up-right" size={26} stroke={2.4}/>}
      </button>
      {status === 'success' ? (
        <p className="font-mono text-sm md:text-base tracking-[0.16em] text-neon text-center mt-1">
          ✓ 메시지가 전송되었습니다. 감사합니다!
        </p>
      ) : status === 'error' ? (
        <p className="font-mono text-sm md:text-base tracking-[0.16em] text-red-400 text-center mt-1">
          ✗ {errorMsg}
        </p>
      ) : (
        <p className="font-mono text-sm md:text-base tracking-[0.16em] text-white/65 text-center mt-1">
          {CONTACT_EMAIL} 로 전송됩니다
        </p>
      )}
    </form>
  );
};

// 다른 페이지에서 Portfolio.html#contact 등으로 진입 시,
// React 렌더가 끝난 뒤 해당 섹션으로 스크롤 (요소가 생길 때까지 잠깐 대기)
(function scrollToHashAfterRender() {
  var id = (location.hash || '').replace('#', '');
  if (!id) return;
  var tries = 0;
  (function attempt() {
    var el = document.getElementById(id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else if (tries++ < 40) {
      requestAnimationFrame(attempt); // 최대 ~40프레임 동안 요소 등장 대기
    }
  })();
})();
